    <button onclick = "getUsers()">Get user data</button>

    <img src = 'Static/Europe_Map_For_Website.png' class = "image" />

<script>

    // XMLHttpRequest => xhr
    var xhr = null;

    getXmlHttpRequestObject = function() {
        if (!xhr) {
            // Create new XMLHttpRequest object
            xhr = new XMLHttpRequest();
        }
        return xhr;
    };

    function dataCallback(){
        //check response is ready or not
        if (xhr.readyState == 4 && xhr.status == 200){
            console.log("user data received!");
            getDate();
            dataDiv = document.getElementById('result-container');
            // set current data text
            dataDiv.innerHTML = xhr.responseText;
        }
    }

    function sendDataCallback(){
        //check response is ready or not
        // changed from xhr.status == 200 to xhr.status == 201
        if (xhr.readyState == 4 && xhr.status == 201){
            console.log("user data received!");
            getDate();
            dataDiv = document.getElementById('result-container');
            // set current data text
            dataDiv.innerHTML = xhr.responseText;
        }
    }

    function sendData(){
        dataToSend = document.getElementById('data-input').value;
        if (!dataToSend) {
            console.log("Data is empty.");
            return;
        }
        console.log("sending data: " + dataToSend);
        xhr = getXmlHttpRequestObject();
        xhr.onreadystatechange = sendDataCallback;
        // asynchronous requests
        xhr.open("POST", "http://127.0.0.1:5000/example", true);
        xhr.setRequestHeader("Content-Type", "application/json;charset=UTF-8");
        // send request over the network
        xhr.send(JSON.stringify({"data": dataToSend}));
    }

    function getUsers() {
        console.log("Get owners");
        xhr = getXmlHttpRequestObject();
        xhr.onreadystatechange = dataCallback;
        // asynchronous requests - added :5000 to link
        xhr.open("GET", "http://127.0.0.1:5000/example", true);
        // send request over network
        xhr.send(null);
    }

    function getDate() {
        // var today = new Date();
        // document.getElementById('date').innerHTML = today
        date = new Date().toString();
        document.getElementById('time-container').textContent = date;
    }
    (function () {
        getDate();
    })();
</script>
